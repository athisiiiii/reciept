<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nextgen Computer Institute — Fee Receipt Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --card: #161d2e;
    --border: #1f2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #e8f0fe;
    --muted: #64748b;
    --success: #10b981;
    --warn: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb.one { width: 400px; height: 400px; background: rgba(0,212,255,0.07); top: -100px; right: -100px; }
  .glow-orb.two { width: 300px; height: 300px; background: rgba(124,58,237,0.08); bottom: 100px; left: -80px; }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 2rem;
    line-height: 1.2;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    animation: fadeUp 0.7s ease both 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
    opacity: 0.6;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .field-group {
    display: grid;
    gap: 18px;
    margin-bottom: 28px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.04em;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
  }

  input, select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }

  input::placeholder { color: #374151; }

  select option { background: var(--surface); }

  .wa-note {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .wa-note::before { content: '🔒'; font-size: 11px; }

  /* Buttons */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 20px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    border: none;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    letter-spacing: 0.03em;
  }

  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .btn-pdf {
    background: linear-gradient(135deg, #0ea5e9, var(--accent));
    color: #000;
    box-shadow: 0 4px 20px rgba(0,212,255,0.25);
  }

  .btn-pdf:hover { box-shadow: 0 6px 28px rgba(0,212,255,0.4); }

  .btn-wa {
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: #fff;
    box-shadow: 0 4px 20px rgba(34,197,94,0.25);
  }

  .btn-wa:hover { box-shadow: 0 6px 28px rgba(34,197,94,0.4); }

  /* Preview section */
  .preview-wrap {
    margin-top: 32px;
    animation: fadeUp 0.5s ease both;
  }

  .preview-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* Receipt styles (inside preview) */
  #receiptPreview {
    padding: 0;
  }

  .receipt-header {
    background: linear-gradient(135deg, #1e3a5f, #0f2644);
    color: white;
    padding: 28px 32px 22px;
    text-align: center;
    position: relative;
  }

  .receipt-header::after {
    content: '';
    position: absolute;
    bottom: -12px; left: 0; right: 0;
    height: 24px;
    background: white;
    clip-path: ellipse(55% 100% at 50% 100%);
  }

  .receipt-inst-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: 0.06em;
    color: #fff;
  }

  .receipt-tagline {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .receipt-body {
    background: #fff;
    padding: 32px 32px 24px;
    color: #1a1a2e;
  }

  .receipt-title {
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 6px;
  }

  .receipt-no {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: #94a3b8;
    margin-bottom: 24px;
  }

  .receipt-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px dashed #e2e8f0;
    font-size: 0.88rem;
  }

  .receipt-row:last-of-type { border-bottom: none; }

  .receipt-row .key {
    color: #64748b;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  .receipt-row .val {
    font-weight: 600;
    color: #1e293b;
    text-align: right;
  }

  .receipt-amount-box {
    background: linear-gradient(135deg, #1e3a5f, #0f2644);
    border-radius: 12px;
    padding: 16px 20px;
    margin: 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .receipt-amount-label {
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .receipt-amount-value {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.6rem;
    color: #fff;
  }

  .receipt-footer {
    text-align: center;
    padding: 16px 32px 24px;
    background: #f8fafc;
    border-top: 1px dashed #e2e8f0;
  }

  .receipt-stamp {
    display: inline-block;
    border: 2px solid #16a34a;
    border-radius: 8px;
    padding: 4px 16px;
    color: #16a34a;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    transform: rotate(-2deg);
    margin-bottom: 10px;
  }

  .receipt-note {
    font-size: 0.7rem;
    color: #94a3b8;
    letter-spacing: 0.04em;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 0.85rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 999;
    transition: transform 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform: translateY(20px);  } to { opacity:1; transform: translateY(0); } }

  @media (max-width: 480px) {
    .card { padding: 24px 18px; }
    .btn-row { grid-template-columns: 1fr; }
    h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="glow-orb one"></div>
<div class="glow-orb two"></div>

<div class="wrapper">
  <!-- Header -->
  <div class="header">
    <div class="logo-mark">
      <div class="logo-icon">💻</div>
      <span class="logo-text">NEXTGEN</span>
    </div>
    <h1>Fee Receipt Generator</h1>
    <p class="subtitle">// Nextgen Computer Institute</p>
  </div>

  <!-- Form Card -->
  <div class="card">
    <div class="section-label">Student Details</div>

    <div class="field-group">
      <div class="field">
        <label>Student Name</label>
        <input type="text" id="studentName" placeholder="e.g. Rahul Sharma" />
      </div>

      <div class="field">
        <label>Month Paid For</label>
        <select id="monthPaid">
          <option value="">— Select Month —</option>
          <option>January 2025</option><option>February 2025</option>
          <option>March 2025</option><option>April 2025</option>
          <option>May 2025</option><option>June 2025</option>
          <option>July 2025</option><option>August 2025</option>
          <option>September 2025</option><option>October 2025</option>
          <option>November 2025</option><option>December 2025</option>
          <option>January 2026</option><option>February 2026</option>
          <option>March 2026</option><option>April 2026</option>
          <option>May 2026</option><option>June 2026</option>
          <option>July 2026</option><option>August 2026</option>
          <option>September 2026</option><option>October 2026</option>
          <option>November 2026</option><option>December 2026</option>
        </select>
      </div>

      <div class="field">
        <label>Amount Paid (₹)</label>
        <input type="number" id="amount" placeholder="e.g. 1500" min="0" />
      </div>

      <div class="field">
        <label>Payment Date</label>
        <input type="date" id="paymentDate" />
      </div>
    </div>

    <div class="section-label">WhatsApp Delivery</div>

    <div class="field-group">
      <div class="field">
        <label>WhatsApp Number</label>
        <input type="tel" id="waNumber" placeholder="e.g. 919876543210 (with country code)" />
        <span class="wa-note">Number is only used for sending — not included in the receipt</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-pdf" onclick="generatePDF()">
        <span>📄</span> Download PDF
      </button>
      <button class="btn btn-wa" onclick="sendWhatsApp()">
        <span>💬</span> Send via WhatsApp
      </button>
    </div>
  </div>

  <!-- Live Preview -->
  <div class="preview-wrap" id="previewSection" style="display:none;">
    <div class="section-label" style="margin-top:32px; color:var(--muted); font-size:0.65rem;">Receipt Preview</div>
    <div class="preview-card">
      <div id="receiptPreview"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const { jsPDF } = window.jspdf;

  // Generate receipt number
  function genReceiptNo() {
    const now = new Date();
    return 'NCI-' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '-' + String(Math.floor(Math.random()*9000)+1000);
  }

  let currentReceiptNo = genReceiptNo();

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-IN', { day:'2-digit', month:'long', year:'numeric' });
  }

  function getFormData() {
    return {
      name: document.getElementById('studentName').value.trim(),
      month: document.getElementById('monthPaid').value,
      amount: document.getElementById('amount').value,
      date: document.getElementById('paymentDate').value,
      waNumber: document.getElementById('waNumber').value.trim()
    };
  }

  function validate(data, needWA = false) {
    if (!data.name) return 'Please enter the student name.';
    if (!data.month) return 'Please select the month paid for.';
    if (!data.amount || isNaN(data.amount) || Number(data.amount) <= 0) return 'Please enter a valid amount.';
    if (!data.date) return 'Please select the payment date.';
    if (needWA && !data.waNumber) return 'Please enter a WhatsApp number.';
    return null;
  }

  function showToast(msg, emoji = '✅') {
    const t = document.getElementById('toast');
    t.innerHTML = emoji + ' ' + msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Build receipt HTML (used for preview only; PDF is drawn manually)
  function buildReceiptHTML(data, receiptNo) {
    return `
      <div class="receipt-header">
        <div class="receipt-inst-name">💻 NEXTGEN COMPUTER INSTITUTE</div>
        <div class="receipt-tagline">Excellence in Computer Education</div>
      </div>
      <div class="receipt-body">
        <div class="receipt-title">Fee Receipt</div>
        <div class="receipt-no">${receiptNo}</div>

        <div class="receipt-row">
          <span class="key">Student Name</span>
          <span class="val">${data.name}</span>
        </div>
        <div class="receipt-row">
          <span class="key">Month Paid For</span>
          <span class="val">${data.month}</span>
        </div>
        <div class="receipt-row">
          <span class="key">Payment Date</span>
          <span class="val">${formatDate(data.date)}</span>
        </div>
        <div class="receipt-row">
          <span class="key">Receipt No.</span>
          <span class="val" style="font-family:monospace;font-size:0.8em">${receiptNo}</span>
        </div>

        <div class="receipt-amount-box">
          <div>
            <div class="receipt-amount-label">Amount Paid</div>
          </div>
          <div class="receipt-amount-value">₹ ${Number(data.amount).toLocaleString('en-IN')}</div>
        </div>
      </div>
      <div class="receipt-footer">
        <div class="receipt-stamp">✓ PAID</div>
        <div class="receipt-note">Thank you for your payment • Nextgen Computer Institute</div>
        <div class="receipt-note" style="margin-top:4px">This is a computer-generated receipt.</div>
      </div>
    `;
  }

  // Show live preview on any input change
  document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', updatePreview);
    el.addEventListener('change', updatePreview);
  });

  function updatePreview() {
    const data = getFormData();
    if (!data.name && !data.amount) {
      document.getElementById('previewSection').style.display = 'none';
      return;
    }
    document.getElementById('previewSection').style.display = 'block';
    document.getElementById('receiptPreview').innerHTML = buildReceiptHTML(data, currentReceiptNo);
  }

  // Generate PDF using jsPDF (canvas approach for clean output)
  async function generatePDF() {
    const data = getFormData();
    const err = validate(data);
    if (err) { showToast(err, '⚠️'); return; }

    currentReceiptNo = genReceiptNo();

    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [105, 150] });
    const W = 105;

    // Header background
    doc.setFillColor(30, 58, 95);
    doc.rect(0, 0, W, 38, 'F');

    // Institute name
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(255, 255, 255);
    doc.text('NEXTGEN COMPUTER INSTITUTE', W/2, 16, { align: 'center' });

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(6.5);
    doc.setTextColor(180, 210, 240);
    doc.text('EXCELLENCE IN COMPUTER EDUCATION', W/2, 22, { align: 'center' });

    // Curved bottom of header (simulate with white rect)
    doc.setFillColor(255, 255, 255);
    doc.ellipse(W/2, 38, W*0.55, 6, 'F');

    // Fee Receipt title
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(100, 116, 139);
    doc.text('FEE RECEIPT', W/2, 46, { align: 'center' });

    doc.setFont('courier', 'normal');
    doc.setFontSize(6);
    doc.setTextColor(148, 163, 184);
    doc.text(currentReceiptNo, W/2, 51, { align: 'center' });

    // Divider
    doc.setDrawColor(226, 232, 240);
    doc.setLineWidth(0.2);

    // Rows
    const rows = [
      ['Student Name', data.name],
      ['Month Paid For', data.month],
      ['Payment Date', formatDate(data.date)],
      ['Receipt No.', currentReceiptNo],
    ];

    let y = 57;
    rows.forEach(([key, val]) => {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      doc.setTextColor(100, 116, 139);
      doc.text(key.toUpperCase(), 12, y);

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(30, 41, 59);
      doc.text(val || '—', W - 12, y, { align: 'right' });

      doc.setDrawColor(226, 232, 240);
      doc.line(12, y + 3, W - 12, y + 3);
      y += 11;
    });

    // Amount box
    doc.setFillColor(30, 58, 95);
    doc.roundedRect(10, y + 2, W - 20, 18, 3, 3, 'F');

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(180, 210, 240);
    doc.text('AMOUNT PAID', 18, y + 12);

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(14);
    doc.setTextColor(255, 255, 255);
    doc.text('\u20B9 ' + Number(data.amount).toLocaleString('en-IN'), W - 18, y + 14, { align: 'right' });

    y += 26;

    // Footer
    doc.setFillColor(248, 250, 252);
    doc.rect(0, y, W, 150 - y, 'F');

    doc.setDrawColor(226, 232, 240);
    doc.setLineDash([1, 1]);
    doc.line(10, y, W - 10, y);
    doc.setLineDash([]);

    // PAID stamp
    doc.setDrawColor(22, 163, 74);
    doc.setLineWidth(0.5);
    doc.roundedRect(W/2 - 14, y + 5, 28, 8, 2, 2);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7);
    doc.setTextColor(22, 163, 74);
    doc.text('\u2713 PAID', W/2, y + 10.5, { align: 'center' });

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(6);
    doc.setTextColor(148, 163, 184);
    doc.text('Thank you for your payment', W/2, y + 20, { align: 'center' });
    doc.text('This is a computer-generated receipt.', W/2, y + 25, { align: 'center' });

    doc.save(`Fee_Receipt_${data.name.replace(/\s+/g,'_')}_${data.month.replace(/\s+/g,'_')}.pdf`);
    showToast('PDF downloaded successfully!', '📄');
  }

  function sendWhatsApp() {
    const data = getFormData();
    const err = validate(data, true);
    if (err) { showToast(err, '⚠️'); return; }

    // Clean number: remove +, spaces, dashes
    let num = data.waNumber.replace(/[\s\-\+]/g, '');
    if (!num.startsWith('91') && num.length === 10) num = '91' + num;

    const msg = encodeURIComponent(
`*Fee Receipt — Nextgen Computer Institute*

Hello *${data.name}*,

Your fee payment has been recorded. Here are the details:

📋 *Receipt No:* ${currentReceiptNo}
📅 *Month Paid:* ${data.month}
💳 *Payment Date:* ${formatDate(data.date)}
💰 *Amount Paid:* ₹${Number(data.amount).toLocaleString('en-IN')}

✅ *Status: PAID*

_Thank you for your timely payment!_
_— Nextgen Computer Institute_`
    );

    window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
    showToast('Opening WhatsApp...', '💬');
  }

  // Set today's date as default
  document.getElementById('paymentDate').valueAsDate = new Date();
</script>
</body>
</html>
